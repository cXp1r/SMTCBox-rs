<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMTC Monitor</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <span class="header-icon">🎵</span>
        <h1>SMTC Monitor</h1>
      </div>
      <div class="header-right">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text" class="status-text">等待数据...</span>
        <button id="btn-refresh" class="btn-refresh" title="立即刷新">↻</button>
      </div>
    </header>

    <main class="main">
      <div id="sessions-container" class="sessions-container">
        <div class="empty-state">
          <div class="empty-icon">🎵</div>
          <p>正在扫描 SMTC 会话...</p>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <span id="footer-info">By cXp1r</span>
      <span id="last-update"></span>
    </footer>
  </body>
</html>
